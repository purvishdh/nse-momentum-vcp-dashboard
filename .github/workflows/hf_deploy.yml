name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "Purvish347/Stock.finder"

          files = [
              "streamlit_app.py",
              "requirements.txt",
              "Dockerfile",
              "README.md",
          ]

          for f in files:
              if os.path.exists(f):
                  api.upload_file(
                      path_or_fileobj=f,
                      path_in_repo=f,
                      repo_id=repo_id,
                      repo_type="space",
                  )
                  print(f"Uploaded {f}")
          print("All files uploaded successfully!")
          EOF
