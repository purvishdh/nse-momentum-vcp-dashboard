name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install -q "huggingface_hub>=0.20.0"

      - name: Upload files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          api = HfApi(token=token)
          repo_id = "Purvish347/Stock.finder"

          try:
              # Verify token works
              whoami = api.whoami()
              print(f"Logged in as: {whoami['name']}")
          except Exception as e:
              print(f"AUTH ERROR: {e}")
              sys.exit(1)

          files = ["streamlit_app.py", "requirements.txt", "Dockerfile", "README.md"]
          try:
              api.upload_folder(
                  folder_path=".",
                  repo_id=repo_id,
                  repo_type="space",
                  allow_patterns=files,
                  commit_message="Deploy from GitHub Actions",
              )
              print("Deploy complete!")
          except Exception as e:
              print(f"UPLOAD ERROR: {e}")
              sys.exit(1)
          PYEOF
