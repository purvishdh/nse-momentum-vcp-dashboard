name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install -q huggingface_hub

      - name: Check token exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is empty or not set!"
            exit 1
          else
            echo "HF_TOKEN is set (length=${#HF_TOKEN})"
          fi

      - name: Upload files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          from huggingface_hub import HfApi, login

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              print("ERROR: HF_TOKEN is empty")
              sys.exit(1)

          try:
              login(token=token)
              api = HfApi()
              repo_id = "Purvish347/Stock.finder"

              for fname in ["streamlit_app.py", "requirements.txt", "Dockerfile", "README.md"]:
                  if os.path.exists(fname):
                      api.upload_file(
                          path_or_fileobj=fname,
                          path_in_repo=fname,
                          repo_id=repo_id,
                          repo_type="space",
                      )
                      print(f"OK: uploaded {fname}")
                  else:
                      print(f"SKIP: {fname} not found")

              print("Deploy complete!")
          except Exception as e:
              print(f"DEPLOY ERROR: {e}")
              sys.exit(1)
          PYEOF
